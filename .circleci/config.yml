version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - node-deps-v1-{{ .Branch }}
            - node-deps-v1
      - run: npm ci
      - save_cache:
          key: node-deps-v1-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run: npm run test

workflows:
  build:
    jobs:
      - build
